<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisk – 8×8 Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Whisk</h1>
    <p class="subtitle">8×8 · 3 in a row = 1 pt, 4 = 4 pts, 5 = 9 pts · First to 50 wins</p>
  </header>

  <main>
    <section class="lobby" data-screen="lobby">
      <div id="name-prompt">
        <p id="second-player-message" class="message info hidden">A game has been started. Enter your name to join.</p>
        <input type="text" id="player-name" placeholder="Your name" maxlength="32" autocomplete="off">
        <button type="button" id="name-submit">Continue</button>
      </div>
      <div id="first-player-actions" class="hidden">
        <p id="first-hello"></p>
        <button type="button" id="play-local">Play locally (one computer)</button>
        <button type="button" id="host-game" class="secondary">Host game (two computers)</button>
        <p style="margin-top:1rem;font-size:0.85rem;color:var(--text-dim);">Or join with a room ID:</p>
        <input type="text" id="room-id-input" placeholder="Paste room ID" style="margin-top:0.25rem;">
        <button type="button" id="join-game" class="secondary">Join game</button>
      </div>
      <p id="lobby-message" class="message hidden"></p>
    </section>

    <section class="game-area" id="game-area" data-screen="game">
      <div class="scores">
        <span class="score-o" id="score-o">O: 0</span> <span id="player-o-name" class="score-o" style="opacity:0.8;"></span>
        <span class="score-x" id="score-x">X: 0</span> <span id="player-x-name" class="score-x" style="opacity:0.8;"></span>
      </div>
      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>
      <p class="status" id="status"></p>
      <p class="game-over hidden" id="game-over"></p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/game.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
