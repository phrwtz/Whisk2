services:
  - name: whisk-backend
    type: web
    env: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: backend/Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: PORT
        value: "8000"
      - key: WHISK_BOT_MCTS_SIMS
        value: "64"
      - key: WHISK_BOT_TEMPERATURE
        value: "0.05"
      - key: WHISK_BOT_EPSILON
        value: "0.0"
      - key: WHISK_BOT_TOP_K
        value: "1"
