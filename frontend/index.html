<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whisk (8x8)</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Whisk</h1>
    <div>
      <div id="status">Connecting…</div>
    </div>
  </header>

  <section id="setup" class="card">
    <h2>Join game</h2>
    <div id="setupNotice" class="setup-notice"></div>

    <label>
      Your name
      <input id="nameInput" />
    </label>

    <p id="modeLabel"><strong>Choose Mode:</strong></p>
    <div id="modePicker">
      <button id="localBtn" class="ui-btn" type="button">Local (one computer)</button>
      <button id="remoteBtn" class="ui-btn" type="button">Remote (two computers)</button>
    </div>

    <div class="setup-actions">
      <button id="instructionsBtnSetup" class="ui-btn hidden" type="button" disabled>Instructions</button>
      <button id="joinBtn" class="ui-btn" type="button" disabled>Join</button>
    </div>
  </section>

  <main class="hidden" id="game">
    <div class="top-row">
      <section class="card" id="scoresCard">
        <h2>Scores</h2>
        <div id="scores" class="scoresText"></div>
      </section>

      <section class="card" id="messagesCard">
        <h2>Messages</h2>
        <div id="messages" class="messages"></div>
      </section>
    </div>

    <section class="card" id="boardCard">
      <div class="board-controls">
        <button class="ui-btn hidden" id="instructionsBtnGame" type="button" disabled>Instructions</button>
        <button class="ui-btn hidden" id="newGameBtn" type="button">New Game</button>
      </div>
      <div id="board" class="board" aria-label="game board"></div>
    </section>
  </main>

  <section id="celebration" class="celebration hidden" aria-live="polite">
    <img
      id="celebrationGif"
      alt="Celebration"
      src="https://media.tenor.com/5ry-200hErMAAAAM/happy-birthday-to-you-kids.gif"
    />
    <div id="celebrationText"></div>
  </section>

  <section id="instructionsModal" class="instructions-modal hidden" aria-live="polite">
    <div class="instructions-panel">
      <h2 id="instructionsTitle">Instructions</h2>
      <div id="instructionsBody" class="instructions-body"></div>
      <button class="ui-btn" id="closeInstructionsBtn" type="button">Close</button>
    </div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
