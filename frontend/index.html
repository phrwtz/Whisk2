<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whisk (8x8)</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>Whisk</h1>
    <div id="status">Connecting…</div>
  </header>

  <section id="setup" class="card">
    <h2>Join game</h2>

    <label>
      Your name
      <input id="nameInput" />
    </label>

    <button id="joinBtn" class="ui-btn" type="button">Join</button>
  </section>

  <main class="hidden" id="game">
    <section id="modePicker" class="card hidden">
      <h2>Choose Mode</h2>
      <p><strong>Host (O):</strong> Choose how you want to play.</p>
      <button id="localBtn" class="ui-btn" type="button">Local (one computer)</button>
      <button id="remoteBtn" class="ui-btn" type="button">Remote (two computers)</button>
    </section>

    <div class="top-row">
      <section class="card" id="scoresCard">
        <h2>Scores</h2>
        <div id="scores" class="scoresText"></div>
      </section>

      <section class="card" id="messagesCard">
        <h2>Messages</h2>
        <div id="messages" class="messages"></div>
      </section>
    </div>

    <section class="card">
      <div id="board" class="board" aria-label="game board"></div>
    </section>
  </main>

  <section id="celebration" class="celebration hidden" aria-live="polite">
    <img
      id="celebrationGif"
      alt="Celebration"
      src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYzR0emJva2xtMGVrdjYwaGN2NjJ5cXl6bml2MjlqYjhnZ2FvbHRuZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l0MYt5jPR6QX5pnqM/giphy.gif"
    />
    <div id="celebrationText"></div>
  </section>

  <button class="ui-btn new-game-fab hidden" id="newGameBtn" type="button">New Game</button>

  <script src="/static/app.js"></script>
</body>
</html>
